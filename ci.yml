name: Django CI

# Workflow uruchamia się automatycznie po pushu i pull_request [cite: 5, 19]
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    [cite_start]runs-on: ubuntu-latest # 

    steps:
    - name: Pobranie kodu repozytorium
      uses: actions/checkout@v4

    - [cite_start]name: Konfiguracja Python 3.12 # 
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        [cite_start]cache: 'pip' # Użycie cache dla zależności pip 

    - [cite_start]name: Instalacja zależności # 
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - [cite_start]name: Wykonanie migracji Django # [cite: 10]
      env:
        # Obsługa zmiennych środowiskowych z GitHub Secrets 
        SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }} 
      run: |
        python manage.py migrate

    - [cite_start]name: Uruchomienie testów Django # [cite: 11]
      env:
        SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      # Jeśli testy się nie powiodą, ten krok zwróci błąd i zatrzyma pipeline [cite: 12, 21]
      run: |
        python manage.py test
